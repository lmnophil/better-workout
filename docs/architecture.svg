<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .title { font-size: 22px; font-weight: 600; fill: #1a1a1a; }
    .subtitle { font-size: 13px; fill: #666; }
    .group-label { font-size: 13px; font-weight: 600; fill: #444; }
    .box-title { font-size: 14px; font-weight: 600; }
    .box-sub { font-size: 11px; }
    .arrow-label { font-size: 11px; font-style: italic; fill: #555; }
    .legend-text { font-size: 11px; fill: #444; }
    .optional-tag { font-size: 10px; font-style: italic; fill: #888; }
    text { dominant-baseline: middle; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="40" class="title">Workout tracker — system architecture</text>
  <text x="40" y="62" class="subtitle">Self-hosted via Docker Compose. Solid lines: in-process or container-to-container. Dashed lines: outbound to third-party services or user-managed infrastructure.</text>

  <!-- ===== USER ===== -->
  <g>
    <rect x="380" y="100" width="200" height="56" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="1"/>
    <text x="480" y="123" text-anchor="middle" class="box-title" fill="#2c2c2a">User (browser / PWA)</text>
    <text x="480" y="142" text-anchor="middle" class="box-sub" fill="#444">React UI, error boundaries</text>
  </g>

  <line x1="480" y1="156" x2="480" y2="184" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="170" class="arrow-label">HTTPS</text>

  <!-- ===== CADDY ===== -->
  <g>
    <rect x="380" y="184" width="200" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
    <text x="480" y="207" text-anchor="middle" class="box-title" fill="#3c3489">Caddy</text>
    <text x="480" y="226" text-anchor="middle" class="box-sub" fill="#534ab7">HTTPS termination, reverse proxy</text>
  </g>

  <line x1="480" y1="240" x2="480" y2="276" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== NEXT.JS APP CONTAINER ===== -->
  <g>
    <rect x="100" y="276" width="760" height="420" rx="14" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
    <text x="120" y="300" class="group-label" fill="#0c447c">Next.js app (single container)</text>
  </g>

  <!-- Middleware -->
  <g>
    <rect x="140" y="320" width="680" height="50" rx="8" fill="#cecbf6" stroke="#534ab7" stroke-width="1"/>
    <text x="480" y="338" text-anchor="middle" class="box-title" fill="#3c3489">Edge middleware</text>
    <text x="480" y="358" text-anchor="middle" class="box-sub" fill="#534ab7">Auth gate · redirects unauthenticated requests to /signin · excludes system endpoints</text>
  </g>

  <!-- Three lanes from middleware -->
  <line x1="250" y1="370" x2="250" y2="416" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="390" text-anchor="middle" class="arrow-label">mutations</text>

  <line x1="480" y1="370" x2="480" y2="416" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="390" text-anchor="middle" class="arrow-label">page loads</text>

  <line x1="710" y1="370" x2="710" y2="416" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="710" y="390" text-anchor="middle" class="arrow-label">scrapes, probes, errors</text>

  <!-- Server actions -->
  <g>
    <rect x="140" y="416" width="220" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
    <text x="250" y="436" text-anchor="middle" class="box-title" fill="#085041">Server actions</text>
    <text x="250" y="456" text-anchor="middle" class="box-sub" fill="#0f6e56">All mutations · lib/actions.ts</text>
    <text x="250" y="470" text-anchor="middle" class="box-sub" fill="#0f6e56">Zod-validated, ownership-checked</text>
  </g>

  <!-- Queries -->
  <g>
    <rect x="380" y="416" width="200" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
    <text x="480" y="436" text-anchor="middle" class="box-title" fill="#085041">Queries</text>
    <text x="480" y="456" text-anchor="middle" class="box-sub" fill="#0f6e56">Server-side reads</text>
    <text x="480" y="470" text-anchor="middle" class="box-sub" fill="#0f6e56">lib/queries.ts (some cached)</text>
  </g>

  <!-- API routes -->
  <g>
    <rect x="600" y="416" width="220" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
    <text x="710" y="436" text-anchor="middle" class="box-title" fill="#085041">API routes</text>
    <text x="710" y="456" text-anchor="middle" class="box-sub" fill="#0f6e56">/api/auth · /api/healthz</text>
    <text x="710" y="470" text-anchor="middle" class="box-sub" fill="#0f6e56">/api/metrics · /api/log/client-error</text>
  </g>

  <line x1="250" y1="476" x2="250" y2="510" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="476" x2="480" y2="600" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="476" x2="710" y2="510" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Auth.js -->
  <g>
    <rect x="140" y="510" width="220" height="60" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
    <text x="250" y="530" text-anchor="middle" class="box-title" fill="#712b13">Auth.js v5</text>
    <text x="250" y="550" text-anchor="middle" class="box-sub" fill="#993c1d">JWT sessions (1-year), Prisma adapter</text>
    <text x="250" y="564" text-anchor="middle" class="box-sub" fill="#993c1d">events → logger + metrics</text>
  </g>

  <!-- Observability -->
  <g>
    <rect x="600" y="510" width="220" height="60" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
    <text x="710" y="530" text-anchor="middle" class="box-title" fill="#712b13">Observability</text>
    <text x="710" y="550" text-anchor="middle" class="box-sub" fill="#993c1d">Pino structured logs (lib/logger)</text>
    <text x="710" y="564" text-anchor="middle" class="box-sub" fill="#993c1d">prom-client metrics (lib/metrics)</text>
  </g>

  <line x1="250" y1="570" x2="250" y2="600" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="570" x2="710" y2="600" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Prisma -->
  <g>
    <rect x="140" y="600" width="220" height="60" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="1"/>
    <text x="250" y="620" text-anchor="middle" class="box-title" fill="#633806">Prisma client</text>
    <text x="250" y="640" text-anchor="middle" class="box-sub" fill="#854f0b">Singleton, slow-query logging</text>
    <text x="250" y="654" text-anchor="middle" class="box-sub" fill="#854f0b">$on('query') → metrics histogram</text>
  </g>

  <!-- stdout -->
  <g>
    <rect x="600" y="600" width="220" height="60" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
    <text x="710" y="620" text-anchor="middle" class="box-title" fill="#712b13">stdout (JSON)</text>
    <text x="710" y="640" text-anchor="middle" class="box-sub" fill="#993c1d">Captured by Docker logs</text>
    <text x="710" y="654" text-anchor="middle" class="box-sub" fill="#993c1d">Rotated, ready for log shipper</text>
  </g>

  <!-- Prisma → SQLite: arrow exits the app box at y=696 (bottom of container), continues to the SQLite box at y=740 -->
  <line x1="250" y1="660" x2="250" y2="740" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== SQLITE (a file on a Docker volume, outside the app container) ===== -->
  <g>
    <rect x="140" y="740" width="220" height="64" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="1"/>
    <text x="250" y="761" text-anchor="middle" class="box-title" fill="#633806">SQLite</text>
    <text x="250" y="781" text-anchor="middle" class="box-sub" fill="#854f0b">Application data (single file)</text>
    <text x="250" y="795" text-anchor="middle" class="box-sub" fill="#854f0b">workout.db · app-data Docker volume</text>
  </g>

  <!-- Backups are no longer a service. The SQLite file is copied out of the
       app-data volume safely (online VACUUM INTO, or stop-and-copy) and handed
       to the operator's own offsite pipeline — nothing to draw inside the stack. -->

  <!-- ===== GOOGLE OAUTH (top left, outside the Next.js box) ===== -->
  <g>
    <rect x="40" y="184" width="180" height="56" rx="8" fill="#fbeaf0" stroke="#993556" stroke-width="1"/>
    <text x="130" y="207" text-anchor="middle" class="box-title" fill="#72243e">Google OAuth</text>
    <text x="130" y="226" text-anchor="middle" class="box-sub" fill="#993556">Sign-in with Google</text>
  </g>

  <!-- Auth.js → Google: exit Auth.js LEFT, up the left margin, into Google.
       Path: (140, 540) → LEFT to x=70 → UP to y=212 → RIGHT into Google at x=220 -->
  <path d="M 140 540 L 70 540 L 70 212 L 220 212" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>

  <!-- ===== RESEND (top right, outside the Next.js box) ===== -->
  <g>
    <rect x="740" y="184" width="180" height="56" rx="8" fill="#fbeaf0" stroke="#993556" stroke-width="1"/>
    <text x="830" y="207" text-anchor="middle" class="box-title" fill="#72243e">Resend</text>
    <text x="830" y="226" text-anchor="middle" class="box-sub" fill="#993556">Magic-link emails</text>
  </g>

  <!-- Auth.js → Resend: exit Auth.js RIGHT, route through the open lane between
       the API-routes row and the Observability row, up and over to Resend.
       The lane at y≈493 is clear (Queries ends at y=476; Observability starts at y=510).
       Path: (360, 540) → RIGHT to x=380 → UP to y=493 → RIGHT to x=890 → UP to y=212 → LEFT into Resend at x=740 -->
  <path d="M 360 540 L 380 540 L 380 493 L 890 493 L 890 212 L 740 212" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>

  <!-- ===== OPTIONAL PROMETHEUS SCRAPE ===== -->
  <g>
    <rect x="838" y="600" width="100" height="60" rx="8" fill="#fbeaf0" stroke="#993556" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="888" y="618" text-anchor="middle" class="box-title" fill="#72243e">Prometheus</text>
    <text x="888" y="636" text-anchor="middle" class="box-sub" fill="#993556">scraper</text>
    <text x="888" y="652" text-anchor="middle" class="optional-tag">(optional)</text>
  </g>

  <!-- API routes → Prometheus (dashed). Prometheus pulls from /api/metrics on the internal Docker network. -->
  <line x1="820" y1="446" x2="888" y2="446" stroke="#888" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="888" y1="446" x2="888" y2="600" stroke="#888" stroke-width="1.5" stroke-dasharray="5 4" marker-start="url(#arrow-dashed)"/>
  <text x="855" y="438" text-anchor="middle" class="arrow-label" fill="#666">scrape</text>

  <!-- Legend -->
  <g transform="translate(40, 930)">
    <text x="0" y="0" class="group-label">Legend</text>

    <line x1="0" y1="22" x2="30" y2="22" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="38" y="22" class="legend-text">Solid: in-process or internal-network call (same Docker network)</text>

    <line x1="450" y1="22" x2="480" y2="22" stroke="#888" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow-dashed)"/>
    <text x="488" y="22" class="legend-text">Dashed: outbound to third-party or user-managed infrastructure</text>

    <rect x="0" y="40" width="14" height="14" rx="3" fill="#cecbf6" stroke="#534ab7"/>
    <text x="20" y="47" class="legend-text">Edge middleware</text>

    <rect x="160" y="40" width="14" height="14" rx="3" fill="#e1f5ee" stroke="#0f6e56"/>
    <text x="180" y="47" class="legend-text">Application code</text>

    <rect x="320" y="40" width="14" height="14" rx="3" fill="#faece7" stroke="#993c1d"/>
    <text x="340" y="47" class="legend-text">Cross-cutting (auth, observability)</text>

    <rect x="560" y="40" width="14" height="14" rx="3" fill="#faeeda" stroke="#854f0b"/>
    <text x="580" y="47" class="legend-text">Data layer</text>

    <rect x="800" y="40" width="14" height="14" rx="3" fill="#fbeaf0" stroke="#993556"/>
    <text x="820" y="47" class="legend-text">Third-party / external</text>
  </g>
</svg>
