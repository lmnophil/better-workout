# Stack: a single Next.js app service backed by a SQLite file on a named volume.
# The app publishes port 3000 to the host; put your own reverse proxy (Caddy,
# nginx, Traefik, …) in front for TLS. See docs/caddy-snippet.example for a
# Caddy config you can paste into an existing site.
#
# All secrets live in .env (sibling to this file).
#
# Backups: the database is a single file at /app/data/workout.db inside the
# `app-data` volume. Copy it safely (SQLite backup API, or while the app is
# stopped) rather than `cp`-ing a live WAL database. See DEPLOY.md → "Backups".
#
# Log rotation: the service uses the json-file driver with size + count caps —
# ~50MB on disk (5 × 10MB rotated, gzipped) — friendly to small VMs without
# losing recent history.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'
    compress: 'true'

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      # Published to all interfaces so a reverse proxy on the host (or another
      # device on your LAN) can reach the app. If your reverse proxy lives on
      # the same host and you don't need LAN access, narrow this to
      # '127.0.0.1:3000:3000'.
      - '3000:3000'
    environment:
      # SQLite database file, persisted on the app-data volume mounted below.
      # entrypoint.sh runs `prisma migrate deploy` against it on every start.
      DATABASE_URL: file:/app/data/workout.db
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      # The app sits behind a reverse proxy in real deployments — trusting
      # forwarded host headers is correct there. It's also harmless when you
      # hit the app directly on localhost (no forwarded headers to read).
      AUTH_TRUST_HOST: 'true'
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_TOKEN: ${METRICS_TOKEN}
      NODE_ENV: production
    volumes:
      - app-data:/app/data
    healthcheck:
      # Hits /api/healthz which does SELECT 1 against SQLite — confirms the full
      # path (driver, db file) is working, not just that the Node process is up.
      test: ['CMD', 'node', 'healthcheck.cjs']
      interval: 30s
      timeout: 10s
      retries: 3
      # First-boot grace: migrations run during entrypoint, then the server has
      # to compile. 30s is comfortable on a small VM.
      start_period: 30s
    logging: *default-logging

volumes:
  app-data:
